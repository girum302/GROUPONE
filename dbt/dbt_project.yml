# dbt_project.yml - dbt Project Configuration

name: 'flight_analytics'
version: '1.0.0'
config-version: 2

profile: 'flight_analytics'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
data-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  flight_analytics:
    # Config applied to all models
    materialized: table
    
    # Staging models - data cleaning and preparation
    staging:
      materialized: view
      description: "Staging tables for raw data"
      
    # Mart models - business-ready aggregations
    marts:
      materialized: table
      description: "Business intelligence tables"

seeds:
  flight_analytics:
    materialized: table

on-run-start:
  - "{{ log('dbt project starting...', info=true) }}"

on-run-end:
  - "{{ log('dbt project completed!', info=true) }}"
